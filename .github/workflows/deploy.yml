name: Deploy Web
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache MkDocs build
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-mkdocs-${{ hashFiles('**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-mkdocs-

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build Marp Slides and View Pages
        run: |
          find . -type d \( -name "node_modules" -o -name ".git" \) -prune -o -type f -name "*.md" -print | while read file; do
            if grep -q "marp: true" "$file"; then

              npx @marp-team/marp-cli "$file" --html --allow-local-files --theme-set Assets/Styles/*.css < /dev/null

              dir_name=$(dirname "$file")
              base_name=$(basename "$file" .md)
              target_html="../${base_name}.html"
              view_file="${dir_name}/${base_name}-view.md"

              ASPECT_RATIO="16 / 9"
              if grep -q "theme: poster" "$file"; then
                ASPECT_RATIO="841 / 1189"
              elif grep -q "theme: handout" "$file"; then
                ASPECT_RATIO="210 / 297"
              elif grep -q "theme: slidedeck" "$file"; then
                ASPECT_RATIO="16 / 9"
              fi

              TAGS_LINE=$(grep "^tags:" "$file" || true)
              DOC_TITLE=$(grep -m 1 "^# " "$file" | sed 's/^# *//' || true)
              if [ -z "$DOC_TITLE" ]; then
                DOC_TITLE="${base_name}"
              fi

              cat <<EOF > "$view_file"
          ---
          title: "${DOC_TITLE}"
          ${TAGS_LINE}
          hide:
            - toc
          ---

          <style>
            .md-typeset h1 { display: none; }
          </style>

          <iframe
            src="${target_html}"
            style="width: 100%; aspect-ratio: ${ASPECT_RATIO}; outline: 1px solid #ccc; display: block;"
          ></iframe>
          EOF
            fi
          done

          find . -type d \( -name "node_modules" -o -name ".git" \) -prune -o -type f \( -name "paper.pdf" -o -name "thesis.pdf" -o -name "textbook.pdf" \) -print | while read pdf_file; do
            dir_name=$(dirname "$pdf_file")
            base_name=$(basename "$pdf_file" .pdf)
            target_src="../${base_name}.pdf"
            view_file="${dir_name}/${base_name}-view.md"

            ASPECT_RATIO="210 / 297"

            DOC_TITLE="${base_name}.pdf"

            cat <<EOF > "$view_file"
          ---
          title: "${DOC_TITLE}"
          hide:
            - toc
          ---
          <style>
            .md-typeset h1 { display: none; }
          </style>

          <iframe
            src="${target_src}"
            style="width: 100%; aspect-ratio: ${ASPECT_RATIO}; outline: 1px solid #ccc; display: block;"
          ></iframe>
          EOF
          done

      - name: Prepare Docs Directory
        run: |
          mkdir docs

          rsync -av \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude='.vscode*' \
            --exclude='node_modules' \
            --exclude='site' \
            --exclude='docs' \
            --exclude='readme.md' \
            --exclude='.gitignore' \
            --exclude='mkdocs.yml' \
            . docs/

          find docs -type f -name "*.md" | while read file; do
            if grep -q "marp: true" "$file"; then
              echo "Removing source: $file"
              rm "$file"
            fi
          done

      - name: Build MkDocs Site
        run: mkdocs build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
